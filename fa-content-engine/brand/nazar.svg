<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Nazar / Evil Eye mark — palette locked to favicon.svg: #1A1F71 + #89C4E1 -->
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="#1A1F71"/>
  <!-- Mid ring -->
  <circle cx="50" cy="50" r="34" fill="#89C4E1"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="22" fill="#1A1F71"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="10" fill="#0d0b2b"/>
  <!-- Glint -->
  <circle cx="44" cy="44" r="4" fill="#ffffff" opacity="0.75"/>
</svg>
